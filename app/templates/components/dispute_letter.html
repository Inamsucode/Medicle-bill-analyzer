<div class="border border-slate-800 bg-slate-950/80 rounded-xl overflow-hidden shadow-xl">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-4 border-b border-slate-800 bg-slate-900/50">
        <div>
            <h3 class="font-bold text-white tracking-tight flex items-center gap-2">
                <span>📝</span> Dispute Letter
            </h3>
            <p class="text-xs text-slate-500">Professional appeal letter generated by AI</p>
        </div>
        <button onclick="copyLetter()" 
                id="copyBtn"
                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold uppercase tracking-wider rounded-lg transition-all duration-200 shadow-md whitespace-nowrap flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
            </svg>
            Copy Letter
        </button>
    </div>
    
    <pre id="appealText" 
         class="font-mono text-xs sm:text-sm text-slate-300 whitespace-pre-wrap bg-slate-950 p-5 leading-relaxed overflow-x-auto max-h-96 overflow-y-auto">{{ letter if letter else "No dispute letter generated yet." }}</pre>
</div>
